syntax = "proto3";
package chassis;

enum LightMode {
  OFF = 0;
  SOLID = 1;
  BLINK = 2;
  BREATH = 3;
}

message HandshakeRequest {
  uint32 protocol_version = 1;
  repeated uint32 supported_cmds = 2;
  string config_hash = 3;
}

message HandshakeResponse {
  uint32 accepted_version = 1;
  string chassis_type = 2;
  string config_hash = 3;
  bool accepted = 4;
  string reject_reason = 5;
}

message VelocityCmd {
  double vx = 1;
  double vy = 2;
  double omega = 3;
  uint64 timestamp_us = 4;
}

message LightCmd {
  LightMode mode = 1;
  uint32 r = 2;
  uint32 g = 3;
  uint32 b = 4;
  double blink_hz = 5;
}

message EmergencyStop {
  string reason = 1;
}

message ChassisStatus {
  uint32 seq = 1;
  uint64 timestamp_us = 2;
  uint32 error_code = 3;
  string error_msg = 4;
}

message Odometry {
  uint32 seq = 1;
  uint64 timestamp_us = 2;
  double x = 3;
  double y = 4;
  double z = 5;
  double qx = 6;
  double qy = 7;
  double qz = 8;
  double qw = 9;
  double vx = 10;
  double vy = 11;
  double omega = 12;
  repeated double cov_pose = 13;   // 36 elements
  repeated double cov_twist = 14;  // 36 elements
}

message BatteryInfo {
  double voltage = 1;
  double current = 2;
  double percentage = 3;
  double temperature = 4;
  bool is_charging = 5;
  repeated double cell_voltages = 6;
}

message ChassisCommand {
  uint32 seq = 1;
  uint32 version = 2;
  oneof payload {
    VelocityCmd velocity = 3;
    LightCmd light = 4;
    EmergencyStop stop = 5;
  }
}

message Ack {
  uint32 seq = 1;
  bool success = 2;
  string message = 3;
}
